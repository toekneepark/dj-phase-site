local_backend: true

backend:
  name: github
  repo: toekneepark/dj-phase-site
  branch: main

media_folder: "public/images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "about"
    label: "About"
    files:
      - name: "bio"
        label: "Bio / About Me"
        file: "src/content/about/bio.md"
        fields:
          - { label: "Name", name: "title", widget: "string", default: "DJ Phase" }
          - { label: "Tagline", name: "tagline", widget: "string", default: "I do stuff with audio." }
          - { label: "Profile Photo", name: "photo", widget: "image", required: false }
          - { label: "Bio", name: "body", widget: "markdown" }
          - label: "Notable Venues"
            name: "venues"
            widget: "list"
            field: { label: "Venue", name: "venue", widget: "string" }

  - name: "gigs"
    label: "Gigs"
    folder: "src/content/gigs"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Event Name", name: "title", widget: "string" }
      - { label: "Date", name: "date", widget: "datetime" }
      - { label: "Venue", name: "venue", widget: "string" }
      - { label: "Location", name: "location", widget: "string" }
      - { label: "Time", name: "time", widget: "string", required: false }
      - { label: "Cover", name: "cover", widget: "string", required: false, default: "Free" }
      - { label: "Type", name: "type", widget: "select", options: ["Weekly Residency", "Special Event", "Private", "Festival", "Corporate"] }
      - { label: "Details", name: "body", widget: "markdown", required: false }

  - name: "media"
    label: "Media"
    folder: "src/content/media"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Date", name: "date", widget: "datetime" }
      - { label: "Type", name: "type", widget: "select", options: ["Mix", "Video", "Photo"] }
      - { label: "URL", name: "url", widget: "string", required: false, hint: "YouTube, SoundCloud, or other embed URL" }
      - { label: "Thumbnail", name: "thumbnail", widget: "image", required: false }
      - { label: "Description", name: "body", widget: "markdown", required: false }

  - name: "blog"
    label: "Blog"
    folder: "src/content/blog"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Date", name: "date", widget: "datetime" }
      - { label: "Read Time", name: "readTime", widget: "string", default: "3 min read" }
      - { label: "Category", name: "category", widget: "select", options: ["Music", "Behind the Scenes", "Gear", "Life", "Events"] }
      - { label: "Featured Image", name: "image", widget: "image", required: false }
      - { label: "Body", name: "body", widget: "markdown" }
